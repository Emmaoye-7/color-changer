<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <h1>🎨 Color Changer</h1>
      <p class="subtitle">Click the button to generate a random color</p>

      <!-- Color display box -->
      <div id="color-box">
        <span id="color-label">#3498db</span>
      </div>

      <!-- Change color button -->
      <button id="change-color-btn">
        ✨ Change Color
      </button>

      <!-- Color history -->
      <div class="history-section">
        <h3>Recent Colors</h3>
        <div id="color-history"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
